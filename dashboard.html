<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h2>Admin Dashboard</h2>
    <a href="{{ url_for('create') }}" class="btn btn-success mb-4">Create Post</a>
    <div class="row">
        {% for post in posts %}
        <div class="col-md-6 mb-3">
            <div class="card">
                <div class="card-body">
                    <h5>{{ post.title }}</h5>
                    <p>{{ post.content[:100] }}...</p>
                    {% for file in post.files %}
                    <a href="{{ url_for('download', filename=file.filename) }}" class="btn btn-sm btn-info">{{ file.filename }}</a>
                    {% endfor %}
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
</body>
</html>
