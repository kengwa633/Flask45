{% extends "base.html" %}

{% block title %}All Posts - My Flask Blog{% endblock %}

{% block content %}
<h1>All Blog Posts</h1>
{% for post in posts %}
    <h2>{{ post.title }}</h2>
    <p><strong>Author:</strong> {{ post.author }}</p>
    <p>{{ post.content }}</p>
    <hr>
{% endfor %}
{% endblock %}
